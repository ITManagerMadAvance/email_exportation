name: Extraction pieces jointes

on:
  workflow_dispatch:
    inputs:
      senders:
        description: "Adresses email dont on interroge directement la boite (separees par des espaces). Laisser vide pour utiliser la liste par defaut."
        required: false
        default: ""
      keyword:
        description: "Mot-cle a filtrer dans l'objet ou le nom du fichier (vide = pas de filtre)"
        required: false
        default: "OV"

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract attachments
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_FOLDER_LINK: ${{ secrets.SHAREPOINT_FOLDER_LINK }}
        run: |
          SENDERS_ARGS=""
          if [ -n "${{ inputs.senders }}" ]; then
            SENDERS_ARGS="--senders ${{ inputs.senders }}"
          fi
          python extract_attachments.py \
            --keyword "${{ inputs.keyword }}" \
            $SENDERS_ARGS \
            --output-dir ./pieces_jointes

      - name: Upload as artifact (copie temporaire de secours)
        uses: actions/upload-artifact@v4
        with:
          name: pieces-jointes
          path: ./pieces_jointes
          retention-days: 7
