name: Diagnostic liste objets et pieces jointes

on:
  workflow_dispatch:
    inputs:
      senders:
        description: "Adresses email a inspecter (separees par des espaces). Vide = les 3 boites OV par defaut."
        required: false
        default: ""

jobs:
  list-subjects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lister objets et pieces jointes (lecture seule)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          SENDERS_ARGS=""
          if [ -n "${{ inputs.senders }}" ]; then
            SENDERS_ARGS="--senders ${{ inputs.senders }}"
          fi
          python list_subjects.py $SENDERS_ARGS
