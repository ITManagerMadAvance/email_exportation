name: Extraction Factures + Proforma

on:
  workflow_dispatch:
    inputs:
      senders:
        description: "Adresse(s) email a interroger (separees par des espaces). Vide = liste par defaut (3 boites OV + olivia)."
        required: false
        default: ""

jobs:
  extract-invoices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract Factures + Proforma (simultane)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_FOLDER_LINK_FACTURES: ${{ secrets.SHAREPOINT_FOLDER_LINK_FACTURES }}
          SHAREPOINT_FOLDER_LINK_PROFORMA: ${{ secrets.SHAREPOINT_FOLDER_LINK_PROFORMA }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          SENDERS_ARGS=""
          if [ -n "${{ inputs.senders }}" ]; then
            SENDERS_ARGS="--senders ${{ inputs.senders }}"
          fi
          python extract_invoices.py $SENDERS_ARGS

      - name: Upload as artifact (copie temporaire de secours)
        uses: actions/upload-artifact@v4
        with:
          name: factures-et-proforma
          path: |
            ./facture
            ./proforma
          retention-days: 7
